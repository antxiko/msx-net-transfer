; NT.INI — configuracion para NT.COM (MSX Net Transfer)
; Coloca este fichero en el mismo directorio que NT.COM en el MSX.
;
; ─── [servers] ────────────────────────────────────────────────────────────
; Lista de servidores. Si hay uno solo, NT conecta automaticamente.
; Si hay mas de uno, aparece un menu de seleccion al arrancar.
; Puedes seguir pasando la IP como argumento: NT 192.168.0.102
;
[servers]
Casa=192.168.0.102
; Oficina=192.168.1.50

; ─── [config] ─────────────────────────────────────────────────────────────
; DownloadDir: nombre de la carpeta donde se guardan las descargas.
;   - Se crea automaticamente en la raiz de la unidad actual (\nombre).
;   - Maximo 8 caracteres.
;   - No puede contener espacios ni: \ / : * ? " < > | .
;   - Por defecto: downloads
;
;[config]
;DownloadDir=downloads
