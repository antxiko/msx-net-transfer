name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-server:
    name: Build server (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            archive: tar.gz
            cli: nthttp
            gui: nthttp-gui
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            archive: tar.gz
            cli: nthttp
            gui: nthttp-gui
          - os: macos-13
            target: x86_64-apple-darwin
            label: macos-x86_64
            archive: tar.gz
            cli: nthttp
            gui: nthttp-gui
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            archive: zip
            cli: nthttp.exe
            gui: nthttp-gui.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }} --bins

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p ../dist/msx-net-transfer-${{ matrix.label }}
          cp target/${{ matrix.target }}/release/${{ matrix.cli }} ../dist/msx-net-transfer-${{ matrix.label }}/
          cp target/${{ matrix.target }}/release/${{ matrix.gui }} ../dist/msx-net-transfer-${{ matrix.label }}/
          cp ../README.md ../dist/msx-net-transfer-${{ matrix.label }}/
          cp ../LICENSE   ../dist/msx-net-transfer-${{ matrix.label }}/
          cp ../client/nt.com ../dist/msx-net-transfer-${{ matrix.label }}/NT.COM

      - name: Pack (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd ../dist
          tar -czf msx-net-transfer-${{ matrix.label }}.tar.gz msx-net-transfer-${{ matrix.label }}/

      - name: Pack (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd ../dist
          Compress-Archive -Path msx-net-transfer-${{ matrix.label }} -DestinationPath msx-net-transfer-${{ matrix.label }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: msx-net-transfer-${{ matrix.label }}
          path: dist/msx-net-transfer-${{ matrix.label }}.*
          retention-days: 7

  release:
    name: Create release
    needs: build-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show artifacts
        run: ls -lR dist/

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body: |
            **MSX Net Transfer** — share files from your PC to a real MSX over the network.

            ## What's in this release

            - **Server binaries** (`nthttp` CLI + `nthttp-gui` desktop GUI):
              - `msx-net-transfer-windows-x86_64.zip`
              - `msx-net-transfer-linux-x86_64.tar.gz`
              - `msx-net-transfer-macos-arm64.tar.gz` (Apple Silicon)
              - `msx-net-transfer-macos-x86_64.tar.gz` (Intel Macs)
            - **MSX client** `NT.COM` is included inside each archive (it's the same binary on every platform).

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for installation and usage instructions.
          files: dist/*
          draft: false
          prerelease: false
